<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>daniil-dashboard</title>
  <style>
    :root { --gold:#d4af37; --gold-dim:#9c7c1f; --bg:#0a0a0a; --fg:#ececec; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body {
      background: radial-gradient(circle at 50% 30%, #161616 0%, var(--bg) 70%);
      color:var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; text-align:center; padding:24px;
    }
    .card { max-width:480px; }
    .logo {
      font-size:42px; font-weight:700; letter-spacing:0.5px;
      background:linear-gradient(135deg, var(--gold), #f4e2a1, var(--gold-dim));
      -webkit-background-clip:text; background-clip:text; color:transparent;
      margin-bottom:8px;
    }
    .sub { color:#8a8a8a; font-size:15px; margin-bottom:32px; }
    .status {
      display:inline-flex; align-items:center; gap:10px;
      border:1px solid var(--gold-dim); border-radius:999px;
      padding:10px 20px; font-size:15px; color:var(--gold);
    }
    .dot { width:10px; height:10px; border-radius:50%; background:#3ddc84;
      box-shadow:0 0 10px #3ddc84; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .meta { margin-top:28px; color:#5a5a5a; font-size:13px; line-height:1.7; }
    .meta b { color:#7a7a7a; font-weight:600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">daniil-dashboard</div>
    <div class="sub">Личный рабочий центр · v3.0</div>
    <div class="status"><span class="dot"></span> Сервер на связи</div>
    <div class="meta">
      Инфраструктура развёрнута на локальном сервере.<br />
      Приложение подключается на следующем этапе.<br />
      <span id="ts"></span>
    </div>
  </div>
  <script>
    // Живая метка времени — подтверждает, что страница отдаётся, а не закэширована
    function tick(){
      const d = new Date();
      document.getElementById('ts').innerHTML =
        '<b>Проверка связи:</b> ' + d.toLocaleString('ru-RU');
    }
    tick(); setInterval(tick, 1000);
  </script>
</body>
</html>
